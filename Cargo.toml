[package]
name = "aiusagebar"
version = "0.1.0"
edition = "2021"

[dependencies]
# tray-icon: libreria leggera, nessuna WebView, nessun Tauri overhead
tray-icon = "0.19"
# event loop nativo macOS/Windows/Linux
winit = { version = "0.30", features = ["rwh_06"] }
# per caricare l'immagine dell'icona
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(target_os = "macos")'.dependencies]
# necessario per far funzionare il menu su macOS
objc2 = "0.5"
